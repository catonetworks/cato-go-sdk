query networkRangeList($accountID: ID!, $input: NetworkRangeListInput!) {
  site(accountId: $accountID) {
    networkRangeList(input: $input) {
      items {
        azureFloatingIp
        dhcpSettings {
          dhcpMicrosegmentation
          dhcpType
          ipRange
          leaseTimeSettings {
            leaseTime
            timeUnit
          }
          relayGroupId
        }
        gateway
        internetOnly
        localIp
        mdnsReflector
        name
        networkRangeId
        rangeType
        subnet
        translatedSubnet
        vlan
      }
      total
    }
  }
}

